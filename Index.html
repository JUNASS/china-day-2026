        function renderSchedule() {
            const input = document.getElementById('userName').value.trim().toLowerCase();
            if(!input) return;

            const filtered = MASTER_DATA.filter(d => 
                d.ko_name === input || d.en_name.toLowerCase() === input
            ).sort((a,b) => a.time.localeCompare(b.time));

            if (filtered.length === 0) {
                alert("등록된 스케줄이 없습니다.");
                return;
            }

            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('schedule-section').classList.remove('hidden');
            
            const user = filtered[0];
            document.getElementById('display-name').innerText = `${user.ko_name} (${user.en_name})`;
            document.getElementById('display-co').innerText = `${user.ko_co} | ${user.en_co}`;

            let html = '';
            filtered.forEach(item => {
                html += `
                    <div class="flex items-center p-4 bg-gray-50 rounded-2xl border border-gray-100 shadow-sm">
                        <div class="w-24 text-sm font-bold text-gray-400 border-r border-gray-200 mr-4">${item.time}</div>
                        <div class="flex-1">
                            <div class="text-xs text-blue-500 font-bold mb-1">Meeting with</div>
                            <div class="text-lg font-black text-gray-800">${item.item}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('schedule-list').innerHTML = html;
        }

        function saveAsImage() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { backgroundColor: '#f3f4f6', scale: 2 }).then(canvas => {
                canvas.toBlob(blob => saveAs(blob, `ChinaDay_Schedule_${document.getElementById('display-name').innerText}.png`));
            });
        }

        function exportToICS() {
            const input = document.getElementById('userName').value.trim();
            const filtered = MASTER_DATA.filter(d => d.ko_name === input || d.en_name === input);
            
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Mirae Asset//China Day 2026//KO\n";
            filtered.forEach(item => {
                const start = item.time.split('~')[0].replace(':','') + "00";
                const end = item.time.split('~')[1].replace(':','') + "00";
                ics += `BEGIN:VEVENT\nSUMMARY:[China Day] Meeting with ${item.item}\nDTSTART:20260409T${start}\nDTEND:20260409T${end}\nLOCATION:Meeting Room\nEND:VEVENT\n`;
            });
            ics += "END:VCALENDAR";
            
            const blob = new Blob([ics], {type: "text/calendar;charset=utf-8"});
            saveAs(blob, "ChinaDay_Schedule.ics");
        }
    </script>
</body>
